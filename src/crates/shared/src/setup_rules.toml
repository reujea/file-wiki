# ─────────────────────────────────────────────────────────────────────
# volume 축
# ─────────────────────────────────────────────────────────────────────

[[rule]]
setting = "max_workers"
recommend = 8
reason = "heavy 볼륨 (>500/주) — 병렬도 상향. 메모리 사용량 증가 주의."
priority = "P0"
risk = "medium"
[rule.condition]
volume = "heavy"

[[rule]]
setting = "crossref.minhash_force_enable"
recommend = true
reason = "heavy 볼륨 — MinHash LSH 강제 활성화로 교차참조 O(N) 회피."
priority = "P0"
risk = "low"
[rule.condition]
volume = "heavy"

[[rule]]
setting = "notification_batch.summary_interval_secs"
recommend = 60
reason = "heavy 볼륨 — 알림 배치 주기 늘려 노이즈 완화."
priority = "P1"
risk = "low"
[rule.condition]
volume = "heavy"

[[rule]]
setting = "memory_tier.hot_days"
recommend = 3
reason = "heavy 볼륨 — hot 윈도 좁혀 자주 접근 문서만 우선."
priority = "P1"
risk = "low"
[rule.condition]
volume = "heavy"

[[rule]]
setting = "vector_db.rrf_multiplier"
recommend = 2
reason = "heavy 볼륨 — prefetch 배수 축소로 메모리 사용량 절감."
priority = "P1"
risk = "low"
[rule.condition]
volume = "heavy"

[[rule]]
setting = "retention.enabled"
recommend = true
reason = "heavy 볼륨 — 디스크 가득참 방지 위해 자동 purge 권장. 적용은 신중하게 (Critical)."
priority = "P0"
risk = "critical"
[rule.condition]
volume = "heavy"

[[rule]]
setting = "max_workers"
recommend = 2
reason = "light 볼륨 (<50/주) — CPU 절약."
priority = "P1"
risk = "low"
[rule.condition]
volume = "light"

[[rule]]
setting = "memory_tier.hot_days"
recommend = 14
reason = "light 볼륨 — hot 윈도 넓혀 검색 우선순위 안정."
priority = "P1"
risk = "low"
[rule.condition]
volume = "light"

