# Phase 76: 설정 추천 룰 테이블
#
# 외부 전문가 답변(prd/queries/initial-setup-advisor-experts.answer.md)의
# §3.2~3.4 매트릭스를 그대로 이관. evidence는 모두 heuristic으로 시작하며,
# 트리거 #3 (5K 코퍼스 + 골든셋) 측정 후 benchmark로 승격할 예정.
#
# 형식:
#   [[rule]]
#   setting = "section.field"          # PipelineConfig path
#   recommend = <value>                # JSON 호환 값
#   reason = "한국어 근거"
#   priority = "P0" | "P1" | "P2"
#   risk = "low" | "medium" | "high" | "critical"
#   evidence = "heuristic" | "benchmark" | "literature" | "user_feedback"
#   confidence = "low" | "medium" | "high"
#   reversible = true | false           # 기본 true
#   restart_required = true | false     # 기본 false
#
#   [rule.condition]
#   sensitivity = "high"                # 해당 축에 매칭 시
#   volume = "heavy"
#   search_intent = "precision"
#   collaboration = "team"
#
#   [rule.condition.content]
#   kind = "meeting" | "research" | "code" | "legal" | "general"
#   min_ratio = 0.5                     # content_mix에서 해당 유형이 이 비율 이상

# ─────────────────────────────────────────────────────────────────────
# content_type 축
# ─────────────────────────────────────────────────────────────────────

# meeting
[[rule]]
setting = "chunking.target_bytes"
recommend = 2000
reason = "회의록은 발화/안건 단위가 길어 1500B에서 문맥 절단 빈도가 높음. 2000B 권장."
priority = "P0"
risk = "low"
[rule.condition.content]
kind = "meeting"
min_ratio = 0.5

[[rule]]
setting = "crossref.cap_related"
recommend = 30
reason = "회의록은 후속 회의·결정 사항과 자주 연결됨. RelatedTopic cap 상향."
priority = "P0"
risk = "low"
[rule.condition.content]
kind = "meeting"
min_ratio = 0.5

[[rule]]
setting = "crossref.similarity_threshold"
recommend = 0.75
reason = "회의록은 어휘 변동이 커 임계 완화 (관계 누락 줄임)."
priority = "P1"
risk = "low"
[rule.condition.content]
kind = "meeting"
min_ratio = 0.5

[[rule]]
setting = "schedule.lint_interval_hours"
recommend = 6
reason = "회의록은 정기적 정합성 검사로 결정/액션 누수 방지."
priority = "P0"
risk = "low"
[rule.condition.content]
kind = "meeting"
min_ratio = 0.5

[[rule]]
setting = "search.window_lines"
recommend = 8
reason = "회의록 매칭은 발화 단위 ±8줄 컨텍스트가 가독성 우수."
priority = "P0"
risk = "low"
[rule.condition.content]
kind = "meeting"
min_ratio = 0.5

[[rule]]
setting = "chunking.overlap_sentences"
recommend = 3
reason = "회의록 청크 경계의 발화 절단 줄임."
priority = "P1"
risk = "low"
[rule.condition.content]
kind = "meeting"
min_ratio = 0.5

[[rule]]
setting = "compression.original_ttl_days"
recommend = 90
reason = "회의록 원본은 90일 보관 권장 (회의 후 follow-up 주기)."
priority = "P1"
risk = "low"
[rule.condition.content]
kind = "meeting"
min_ratio = 0.5

# research
[[rule]]
setting = "chunking.target_bytes"
recommend = 1500
reason = "논문/연구는 단락 단위가 적절. 기본값 유지를 명시 추천."
priority = "P1"
risk = "low"
[rule.condition.content]
kind = "research"
min_ratio = 0.5

[[rule]]
setting = "chunking.preserve_code_blocks"
recommend = true
reason = "연구 문서의 수식/코드 블록 보존 필수."
priority = "P1"
risk = "low"
[rule.condition.content]
kind = "research"
min_ratio = 0.5

[[rule]]
setting = "chunking.overlap_sentences"
recommend = 3
reason = "논문은 인접 단락 참조가 잦아 오버랩 증가."
priority = "P1"
risk = "low"
[rule.condition.content]
kind = "research"
min_ratio = 0.5

[[rule]]
setting = "rerank.enabled"
recommend = true
reason = "연구 검색은 정밀도 우선 — Cross-Encoder 리랭킹 활성."
priority = "P0"
risk = "low"
[rule.condition.content]
kind = "research"
min_ratio = 0.5

[[rule]]
setting = "rerank.top_n"
recommend = 30
reason = "연구는 후보군을 넓게 두고 리랭킹으로 선별."
priority = "P1"
risk = "low"
[rule.condition.content]
kind = "research"
min_ratio = 0.5

[[rule]]
setting = "crossref.similarity_threshold"
recommend = 0.85
reason = "연구는 노이즈 관계를 줄여야 함 — 임계 상향."
priority = "P0"
risk = "low"
[rule.condition.content]
kind = "research"
min_ratio = 0.5

[[rule]]
setting = "crossref.supersedes_threshold"
recommend = 0.93
reason = "논문 개정/대체 판정 임계 약간 완화."
priority = "P1"
risk = "low"
[rule.condition.content]
kind = "research"
min_ratio = 0.5

[[rule]]
setting = "crossref.cap_related"
recommend = 30
reason = "연구는 인용/참조 관계가 많음."
priority = "P0"
risk = "low"
[rule.condition.content]
kind = "research"
min_ratio = 0.5

[[rule]]
setting = "verification.thresholds"
recommend = { structure_min = 0.5, compression_min = 0.05, compression_max = 1.5, keyword_coverage_min = 0.5, keyword_completeness_min = 0.3, rouge_l_min = 0.5, entity_preservation_min = 0.5 }
reason = "연구 가공은 ROUGE-L 0.5 기준으로 정밀도 우선."
priority = "P0"
risk = "medium"
[rule.condition.content]
kind = "research"
min_ratio = 0.5

[[rule]]
setting = "compression.original_ttl_days"
recommend = 0
reason = "연구 자료는 장기 보존 (0=무제한)."
priority = "P0"
risk = "low"
[rule.condition.content]
kind = "research"
min_ratio = 0.5

[[rule]]
setting = "preprocessing.pdf_tool"
recommend = "marker"
reason = "연구 PDF는 marker가 수식·표·인용 보존성 우수 (pip install marker-pdf 필요)."
priority = "P0"
risk = "medium"
[rule.condition.content]
kind = "research"
min_ratio = 0.5

[[rule]]
setting = "search.window_lines"
recommend = 5
reason = "연구는 단락 단위 ±5줄로 핵심 문장 표시."
priority = "P1"
risk = "low"
[rule.condition.content]
kind = "research"
min_ratio = 0.5

[[rule]]
setting = "search.mmr_lambda"
recommend = 0.7
reason = "연구는 관련도 우선 (다양성보다 정밀도)."
priority = "P1"
risk = "low"
[rule.condition.content]
kind = "research"
min_ratio = 0.5

