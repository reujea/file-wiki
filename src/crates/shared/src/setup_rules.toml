# ─────────────────────────────────────────────────────────────────────
# sensitivity 축
# ─────────────────────────────────────────────────────────────────────

[[rule]]
setting = "sensitive.extensions"
recommend = [".env", ".pem", ".key", ".p12", ".pfx", ".keystore", ".crt", ".cer"]
reason = "민감도 high — 자격증명/키 파일 격리 필수."
priority = "P0"
risk = "low"
[rule.condition]
sensitivity = "high"

[[rule]]
setting = "sensitive.keywords"
recommend = ["password", "secret", "private_key", "api_key", "token", "credential", "비밀번호", "주민등록번호", "계좌번호"]
reason = "민감도 high — 키워드 기반 격리 강화."
priority = "P0"
risk = "low"
[rule.condition]
sensitivity = "high"

[[rule]]
setting = "compression.encrypt_sensitive"
recommend = true
reason = "민감도 high — 민감 디렉토리 암호화 (예약 기능)."
priority = "P0"
risk = "low"
[rule.condition]
sensitivity = "high"

[[rule]]
setting = "logging.level"
recommend = "warn"
reason = "민감도 high — 로그에 콘텐츠 단편 노출을 줄임."
priority = "P1"
risk = "low"
[rule.condition]
sensitivity = "high"

