# Phase 80-E: 동작 모듈 정의
#
# 사용자가 "어떤 동작을 우선하나"를 직접 선택하는 의미 모듈.
# 5축 룰 추론(Phase 76)을 폐기하고 모듈 합집합으로 대체.
#
# 형식:
#   [[module]]
#   id = "..."          # 고유 ID
#   group = "process" | "search" | "ops"
#   icon = "..."
#   label = "..."       # UI 표시명
#   hint = "..."        # 한 줄 설명
#   priority = "P0" | "P1" | "P2"
#   exclusive_group = "..."  # 같은 그룹은 택 1 (배타)
#
#   [[module.changes]]
#   path = "section.field"
#   value = <json>
#   reason = "..."
#   risk = "low" | "medium" | "high" | "critical"

# ─────────────────────────────────────────────────────────────────
# 가공 측면 (5)
# ─────────────────────────────────────────────────────────────────

[[module]]
id = "secure_strict"
group = "process"
icon = "🔒"
label = "민감 정보 강화"
hint = "비밀번호·키 파일 격리 + 암호화 + warn 로그"
priority = "P0"
[[module.changes]]
path = "sensitive.extensions"
value = [".env", ".pem", ".key", ".p12", ".pfx", ".keystore", ".crt", ".cer", ".pgp", ".gpg"]
reason = "자격증명/인증서/암호 파일 자동 격리"
risk = "low"
[[module.changes]]
path = "sensitive.keywords"
value = ["password", "secret", "private_key", "api_key", "token", "credential", "비밀번호", "주민등록번호", "계좌번호"]
reason = "민감 키워드 기반 격리 강화"
risk = "low"
[[module.changes]]
path = "compression.encrypt_sensitive"
value = true
reason = "민감 디렉토리 암호화"
risk = "low"
[[module.changes]]
path = "logging.level"
value = "warn"
reason = "콘텐츠 단편의 로그 노출 줄임"
risk = "low"

